<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>发布行程 — CampusPool</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="nav-placeholder"></div>
<div class="container">
<div class="page-header"><h1>发布行程</h1><p>填写信息，寻找同行伙伴</p></div>
<div style="max-width:580px;margin:0 auto 60px">
<div id="pubErr" class="alert alert-error hidden"></div>
<div id="pubOk" class="alert alert-success hidden"></div>
<div class="card"><div class="card-body">
<div class="form-group"><label class="form-label">行程类型 <span class="required">*</span></label><div class="type-toggle"><label style="border-right:1px solid var(--gray-200)"><input type="radio" name="type" value="offer" checked><span>提供拼车</span></label><label><input type="radio" name="type" value="seek"><span>寻求拼车</span></label></div></div>
<div class="form-row"><div class="form-group"><label class="form-label">出发地 <span class="required">*</span></label><input type="text" class="form-input" id="from" placeholder="如：清华大学"></div><div class="form-group"><label class="form-label">目的地 <span class="required">*</span></label><input type="text" class="form-input" id="to" placeholder="如：北京南站"></div></div>
<div class="form-row"><div class="form-group"><label class="form-label">出行时间 <span class="required">*</span></label><input type="datetime-local" class="form-input" id="time"></div><div class="form-group"><label class="form-label">人数 <span class="required">*</span></label><input type="number" class="form-input" id="seats" min="1" max="10" value="2"></div></div>
<div class="form-group"><label class="form-label">备注</label><textarea class="form-input" id="note" placeholder="集合地点、费用AA、行李情况等..." rows="3"></textarea></div>
<button class="btn btn-primary btn-lg" id="pubBtn" style="width:100%">发布行程</button>
</div></div>
<div class="mt-3" id="myRecent" style="display:none"><h3 style="font-size:0.95rem;font-weight:600;margin-bottom:10px">我发布的行程</h3><div class="trip-list" id="myTripsList"></div></div>
</div></div>
<footer class="footer"><div class="container"><p>CampusPool · 安全出行</p></div></footer>
<script src="js/store.js"></script>
<script src="js/main.js"></script>
<script>
App.init('publish');
if(!App.requireAuth()){}
var t=new Date();t.setDate(t.getDate()+1);t.setMinutes(0,0,0);document.getElementById('time').value=t.toISOString().slice(0,16);
document.getElementById('pubBtn').addEventListener('click',function(){
  var user=App.getUser(),from=document.getElementById('from').value.trim(),to=document.getElementById('to').value.trim(),time=document.getElementById('time').value,seats=parseInt(document.getElementById('seats').value),note=document.getElementById('note').value.trim(),type=document.querySelector('input[name="type"]:checked').value,err=document.getElementById('pubErr'),ok=document.getElementById('pubOk');
  err.classList.add('hidden');ok.classList.add('hidden');
  if(!from||!to||!time){err.textContent='请填写出发地、目的地和出行时间';err.classList.remove('hidden');return}
  if(!seats||seats<1){err.textContent='人数至少为1';err.classList.remove('hidden');return}
  Store.createTrip(user.id,{departure:from,destination:to,depart_time:time.replace('T',' ')+':00',seats:seats,note:note,trip_type:type});
  ok.textContent='行程发布成功';ok.classList.remove('hidden');
  document.getElementById('from').value='';document.getElementById('to').value='';document.getElementById('note').value='';
  loadMy();setTimeout(function(){ok.classList.add('hidden')},5000);
});
function loadMy(){var d=Store.getUserTrips(App.getUser().id);if(d.myTrips.length){document.getElementById('myRecent').style.display='block';document.getElementById('myTripsList').innerHTML=d.myTrips.slice(0,3).map(function(t){return'<a href="detail.html?id='+t.id+'" class="card trip-card"><div class="trip-direction '+t.trip_type+'">'+(t.trip_type==='offer'?'搭车':'求车')+'</div><div class="trip-info"><div class="trip-route">'+t.departure+' <span class="arrow">→</span> '+t.destination+'</div><div class="trip-meta"><span>'+App.fmt(t.depart_time)+'</span><span class="badge '+(t.status==='active'?'badge-green':'badge-gray')+'">'+(t.status==='active'?'进行中':t.status)+'</span></div></div></a>'}).join('')}}
loadMy();
</script>
</body>
</html>
